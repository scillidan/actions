name: Repos Stars (CSV)

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not commit or push)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: repos-stars

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('repos-stars/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate CSV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python get_repos_stars.py

      - name: Validate CSV
        run: |
          LINES=$(wc -l < repos-stars.csv)
          if [ "$LINES" -lt 2 ]; then
            echo "repos-stars.csv appears empty or invalid"
            exit 1
          fi
          sha256sum repos-stars.csv

      - name: Check for changes
        id: changes
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: |
          steps.changes.outputs.changed == 'true' &&
          inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update repos-stars.csv [skip ci]"
          git push

      - name: Dry run notice
        if: inputs.dry_run == 'true'
        run: |
          echo "::notice title=Dry Run::Dry run enabled — no commit or push performed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repos-stars-csv
          path: repos-stars/repos-stars.csv
          retention-days: 90
