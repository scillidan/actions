name: SPDX Licenses (CSV)

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not commit or push)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: spdx-licenses

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Get latest SPDX release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/spdx/license-list-data/releases/latest"
          json=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api")

          raw_tag=$(printf '%s' "$json" | jq -r '.tag_name')
          version=$(printf '%s' "$raw_tag" | sed 's/^v//')

          tarball="https://github.com/spdx/license-list-data/archive/refs/tags/${raw_tag}.tar.gz"

          echo "raw_tag=$raw_tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Load last seen version
        id: last
        run: |
          FILE=".spdx-upstream-version"
          if [ -f "$FILE" ]; then
            echo "version=$(cat $FILE)" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if upstream unchanged
        if: steps.last.outputs.version == steps.upstream.outputs.version
        run: |
          echo "Upstream has no new release. Exiting."
          exit 0

      - name: Clean old artifacts
        run: |
          rm -f spdx-licenses.csv spdx-licenses.meta.json
          rm -rf license-list-data-*/

      - name: Download & extract SPDX data
        run: |
          curl -fsSL "${{ steps.upstream.outputs.tarball }}" -o spdx.tar.gz
          tar -xzf spdx.tar.gz
          ls -d license-list-data-*/

      - name: Generate CSV
        run: |
          chmod +x spdx_json_to_csv.sh
          ./spdx_json_to_csv.sh spdx-licenses.csv

      - name: Validate CSV
        run: |
          LINES=$(wc -l < spdx-licenses.csv)
          if [ "$LINES" -lt 2 ]; then
            echo "spdx-licenses.csv appears empty or invalid"
            exit 1
          fi
          sha256sum spdx-licenses.csv

      - name: Generate metadata file
        run: |
          cat > spdx-licenses.meta.json << EOF
          {
            "version": "${{ steps.upstream.outputs.version }}",
            "generated": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "source": "https://github.com/spdx/license-list-data",
            "spdx_release_tag": "${{ steps.upstream.outputs.raw_tag }}"
          }
          EOF

      - name: Record upstream version
        run: |
          echo "${{ steps.upstream.outputs.version }}" > .spdx-upstream-version

      - name: Check for changes
        id: changes
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: |
          steps.changes.outputs.changed == 'true' &&
          inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update SPDX licenses to ${{ steps.upstream.outputs.version }} [skip ci]"
          git push

      - name: Dry run notice
        if: inputs.dry_run == 'true'
        run: |
          echo "::notice title=Dry Run::Dry run enabled — no commit or push performed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spdx-licenses-${{ steps.upstream.outputs.version }}
          path: |
            spdx-licenses/spdx-licenses.csv
            spdx-licenses/spdx-licenses.meta.json
          retention-days: 90